version: '3.8'

services:
  arbk-scraper:
    build: .
    container_name: arbk-scraper
    restart: unless-stopped
    ports:
      - "127.0.0.1:8181:8080"
    environment:
      - PORT=8080
      - NODE_ENV=production
      # Get a free API key at https://capsolver.com — ~$1-3/1000 Turnstile solves
      # Highly recommended on VPS servers where plain headless browsers get blocked
      - CAPSOLVER_API_KEY=${CAPSOLVER_API_KEY:-}
    shm_size: '256mb'
    security_opt:
      - no-new-privileges:true
